name: Build Chrome Extension

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Create Zip Archive
        run: |
          zip -r Legal-Research-Helper-chrome-extension.zip . -x "*.git*" -x ".github/*" -x "graphify-out/*"
          
      - name: Upload Extension Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Legal-Research-Helper-chrome-extension
          path: Legal-Research-Helper-chrome-extension.zip
          
      - name: Publish to GitHub Releases
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Extension Build
          body: "Automatically generated zip file of the latest extension code from the main branch."
          prerelease: true
          files: Legal-Research-Helper-chrome-extension.zip
